<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>글 상세보기 | 게시판</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            padding: 50px 20px;
            background-color: #f4f7f9;
            color: #2d3436;
            letter-spacing: -0.02em;
        }
        .view-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }
        .view-header { border-bottom: 2px solid #2d3436; padding-bottom: 20px; margin-bottom: 30px; }
        .view-title { font-size: 28px; font-weight: 800; color: #1a1a1a; margin-bottom: 15px; }
        .view-info { display: flex; gap: 20px; color: #95a5a6; font-size: 14px; }
        .info-item b { color: #444; margin-right: 5px; }
        .view-content {
            min-height: 300px;
            font-size: 16px;
            line-height: 1.8;
            color: #333;
            white-space: pre-wrap;
            word-break: break-all;
            margin-bottom: 50px;
        }
        .btn-group-custom { display: flex; justify-content: space-between; border-top: 1px solid #eee; padding-top: 30px; }
        .btn { padding: 10px 25px; font-weight: 600; border-radius: 6px; transition: 0.2s; }
        .btn-list { background-color: #f8f9fa; color: #636e72; border: 1px solid #dfe6e9; text-decoration: none; }
        .btn-list:hover { background-color: #dfe6e9; color: #2d3436; }
        .btn-edit { background-color: #2d3436; color: white; border: none; text-decoration: none; }
        .btn-edit:hover { background-color: #000; color: white; }
        .btn-delete { background-color: #fff; color: #e74c3c; border: 1px solid #e74c3c; }
        .btn-delete:hover { background-color: #ffedeb; }
    </style>
</head>
<body>

<div class="view-container">
    <div class="view-header" th:if="${board != null}">
        <h1 class="view-title" th:text="${board.title}">제목</h1>
        <div class="view-info">
            <span class="info-item"><b>작성자</b> <span th:text="${board.author}">작성자</span></span>
            <span class="info-item"><b>등록일</b> <span th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}">날짜</span></span>
            <span style="margin-left: 15px;">
        <i class="bi bi-eye"></i> 조회수: <b th:text="${board.views}">0</b>
    </span>
        </div>
    </div>

    <div class="view-content" th:if="${board != null}" th:text="${board.content}">
        내용
    </div>

    <div class="btn-group-custom">
        <a href="/api/board/list" class="btn btn-list">목록으로</a>
        <div th:if="${board != null}">
            <a th:href="@{/api/board/edit/{id}(id=${board.id})}" class="btn btn-edit me-2">수정</a>
            <button type="button" class="btn btn-delete"
                    th:onclick="deleteBoard([[${board.id}]])">삭제</button>
        </div>
    </div>

    <hr style="margin-top: 40px;">

    <div class="comment-section mt-5">
        <h5 class="fw-bold mb-3">댓글 목록 <span class="text-primary" th:text="${#lists.size(comments)}">0</span></h5>

        <div th:if="${#lists.isEmpty(comments)}" class="text-center py-4 text-muted border-top border-bottom">
            첫 번째 댓글을 남겨보세요!
        </div>

        <div th:each="c : ${comments}" class="py-3 border-bottom shadow-sm-hover" style="transition: background 0.2s;">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <strong class="text-dark" th:text="${c.author}" style="font-size: 1rem;">작성자</strong>
                <small class="text-muted" th:text="${#temporals.format(c.createdAt, 'yyyy-MM-dd HH:mm')}">시간</small>
            </div>

            <div th:if="${c.imageUrl != null}" class="my-2">
                <img th:src="${c.imageUrl}" alt="첨부 이미지"
                     style="max-width: 300px; height: auto; border-radius: 8px; border: 1px solid #eee; display: block;">
            </div>

            <p class="mb-0 text-secondary" style="line-height: 1.6; white-space: pre-wrap;" th:text="${c.content}">댓글 내용</p>
        </div>
    </div>

    <div class="comment-form mt-4 p-4 bg-light rounded-3 border">
        <h6 class="mb-3 fw-bold">댓글 남기기</h6>
        <form th:action="@{/api/board/comment/add}" method="post" enctype="multipart/form-data">
            <input type="hidden" name="boardId" th:value="${board.id}">

            <div class="row g-2">
                <div class="col-md-3">
                    <input type="text" name="author" class="form-control shadow-sm" placeholder="작성자" required>
                </div>
                <div class="col-md-7">
                    <input type="text" name="content" class="form-control shadow-sm" placeholder="내용을 입력하세요" required>
                </div>

                <div class="col-md-10 mt-2">
                    <input type="file" name="file" class="form-control form-control-sm shadow-sm">
                </div>

                <div class="col-md-2 mt-2">
                    <button type="submit" class="btn btn-primary w-100 shadow-sm fw-bold">등록</button>
                </div>
            </div>
        </form>
    </div>

</div>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        const deleteBtn = document.getElementById('deleteBtn');
        if (deleteBtn) {
            deleteBtn.addEventListener('click', function() {
                const id = this.getAttribute('data-id'); // 버튼에 숨겨둔 ID 추출
                deleteBoard(id);
            });
        }
    });

    function deleteBoard(id) {
        if (!id) return;
        if (confirm("정말로 이 게시글을 삭제하시겠습니까?")) {
            fetch('/api/board/delete/' + id, {
                method: 'DELETE'
            }).then(response => {
                if (response.ok) {
                    alert("삭제되었습니다.");
                    location.href = '/api/board/list';
                } else {
                    alert("삭제에 실패했습니다.");
                }
            }).catch(err => {
                console.error(err);
                alert("에러가 발생했습니다.");
            });
        }
    }
</script>
</body>
</html>
