<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>글 상세보기 | 게시판</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            padding: 50px 20px;
            background-color: #f4f7f9;
            color: #2d3436;
            letter-spacing: -0.02em;
        }
        .view-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }
        .view-header { border-bottom: 2px solid #2d3436; padding-bottom: 20px; margin-bottom: 30px; }
        .view-title { font-size: 28px; font-weight: 800; color: #1a1a1a; margin-bottom: 15px; }
        .view-info { display: flex; gap: 20px; color: #95a5a6; font-size: 14px; }
        .info-item b { color: #444; margin-right: 5px; }
        .view-content {
            min-height: 300px;
            font-size: 16px;
            line-height: 1.8;
            color: #333;
            white-space: pre-wrap;
            word-break: break-all;
            margin-bottom: 50px;
        }
        .btn-group-custom { display: flex; justify-content: space-between; border-top: 1px solid #eee; padding-top: 30px; }
        .btn { padding: 10px 25px; font-weight: 600; border-radius: 6px; transition: 0.2s; }
        .btn-list { background-color: #f8f9fa; color: #636e72; border: 1px solid #dfe6e9; text-decoration: none; }
        .btn-list:hover { background-color: #dfe6e9; color: #2d3436; }
        .btn-edit { background-color: #2d3436; color: white; border: none; text-decoration: none; }
        .btn-edit:hover { background-color: #000; color: white; }
        .btn-delete { background-color: #fff; color: #e74c3c; border: 1px solid #e74c3c; }
        .btn-delete:hover { background-color: #ffedeb; }

        /* 댓글 액션 스타일 */
        .comment-actions { font-size: 12px; margin-left: 10px; }
        .comment-actions a { color: #b2bec3; text-decoration: none; cursor: pointer; margin-left: 5px; }
        .comment-actions a:hover { color: #636e72; text-decoration: underline; }

        /* 수정 영역 스타일 */
        .edit-area { display: none; margin-top: 10px; background: #f9f9f9; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="view-container">
    <div class="view-header" th:if="${board != null}">
        <h1 class="view-title" th:text="${board.title}">제목</h1>
        <div class="view-info">
            <span class="info-item"><b>작성자</b> <span th:text="${board.author}">작성자</span></span>
            <span class="info-item"><b>등록일</b> <span th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}">날짜</span></span>
            <span style="margin-left: 15px;">조회수: <b th:text="${board.views}">0</b></span>
        </div>
    </div>

    <div class="view-content" th:if="${board != null}" th:text="${board.content}">내용</div>

    <div class="btn-group-custom">
        <a href="/api/board/list" class="btn btn-list">목록으로</a>
        <div th:if="${board != null}">
            <a th:href="@{/api/board/edit/{id}(id=${board.id})}" class="btn btn-edit me-2">수정</a>
            <button type="button" class="btn btn-delete" th:onclick="deleteBoard([[${board.id}]])">삭제</button>
        </div>
    </div>

    <hr style="margin-top: 40px;">

    <div class="comment-section mt-5">
        <h5 class="fw-bold mb-3">댓글 목록 <span class="text-primary" th:text="${#lists.size(comments)}">0</span></h5>

        <div th:if="${#lists.isEmpty(comments)}" class="text-center py-4 text-muted border-top border-bottom">
            첫 번째 댓글을 남겨보세요!
        </div>

        <div th:each="c : ${comments}" class="py-3 border-bottom" th:id="'comment-row-' + ${c.id}">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <div>
                    <strong class="text-dark" th:text="${c.author}">작성자</strong>
                    <span class="comment-actions">
                        <a th:onclick="toggleEditMode([[${c.id}]])">수정</a>
                        <a th:onclick="deleteComment([[${c.id}]])" class="text-danger">삭제</a>
                    </span>
                </div>
                <small class="text-muted" th:text="${#temporals.format(c.createdAt, 'yyyy-MM-dd HH:mm')}">시간</small>
            </div>

            <p th:id="'comment-text-' + ${c.id}" class="mb-0 text-secondary" style="line-height: 1.6; white-space: pre-wrap;" th:text="${c.content}">댓글 내용</p>

            <div th:id="'comment-edit-area-' + ${c.id}" class="edit-area">
                <textarea th:id="'comment-input-' + ${c.id}" class="form-control mb-2" rows="2" th:text="${c.content}"></textarea>
                <div class="text-end">
                    <button type="button" class="btn btn-sm btn-outline-secondary me-1" th:onclick="toggleEditMode([[${c.id}]])">취소</button>
                    <button type="button" class="btn btn-sm btn-primary" th:onclick="updateComment([[${c.id}]])">저장</button>
                </div>
            </div>
        </div>
    </div>

    <div class="comment-form mt-4 p-4 bg-light rounded-3 border">
        <h6 class="mb-3 fw-bold">댓글 남기기</h6>
        <form th:action="@{/api/board/comment/add}" method="post">
            <input type="hidden" name="boardId" th:value="${board.id}">
            <div class="row g-2">
                <div class="col-md-3">
                    <input type="text" name="author" class="form-control shadow-sm" placeholder="작성자" required>
                </div>
                <div class="col-md-7">
                    <input type="text" name="content" class="form-control shadow-sm" placeholder="내용을 입력하세요" required>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100 shadow-sm fw-bold">등록</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script th:inline="javascript">
    // 게시글 삭제
    function deleteBoard(id) {
        if (!id || !confirm("정말로 이 게시글을 삭제하시겠습니까?")) return;
        fetch('/api/board/delete/' + id, { method: 'DELETE' })
            .then(response => {
                if (response.ok) {
                    alert("삭제되었습니다.");
                    location.href = '/api/board/list';
                } else { alert("삭제 실패!"); }
            });
    }

    // 댓글 삭제
    function deleteComment(commentId) {
        if (!confirm("댓글을 삭제하시겠습니까?")) return;
        fetch('/api/board/comment/delete/' + commentId, { method: 'POST' })
            .then(response => {
                if (response.ok) location.reload();
                else alert("삭제에 실패했습니다.");
            });
    }

    // 수정 모드 껏다 켰다 하기
    function toggleEditMode(commentId) {
        const textP = document.getElementById('comment-text-' + commentId);
        const editDiv = document.getElementById('comment-edit-area-' + commentId);

        // 현재 숨겨져 있으면 보이게, 보이고 있으면 숨기게
        if (editDiv.style.display === 'none' || editDiv.style.display === '') {
            textP.style.display = 'none';
            editDiv.style.display = 'block';
        } else {
            textP.style.display = 'block';
            editDiv.style.display = 'none';
        }
    }

    // 실제 댓글 수정 처리
    function updateComment(commentId) {
        const input = document.getElementById('comment-input-' + commentId);
        const newContent = input.value;

        if (!newContent.trim()) {
            alert("내용을 입력해주세요.");
            return;
        }

        const formData = new URLSearchParams();
        formData.append("content", newContent);

        fetch('/api/board/comment/update/' + commentId, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData
        }).then(response => {
            if (response.ok) {
                location.reload();
            } else { alert("수정에 실패했습니다."); }
        });
    }
</script>
</body>
</html>
