<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KKS 게시판</title>
    <style>
        /* 전체적인 글꼴과 배경 */
        body { font-family: 'Pretendard', sans-serif; padding: 40px; background-color: #f9f9f9; color: #333; }
        h2 { color: #2c3e50; margin-bottom: 20px; }

        /* 새 글 쓰기 버튼 */
        .btn-write {
            background-color: #007bff; color: white; padding: 10px 20px;
            border: none; border-radius: 5px; cursor: pointer;
            font-size: 16px; font-weight: bold; transition: background 0.3s;
            margin-bottom: 15px;
        }
        .btn-write:hover { background-color: #0056b3; }

        /* 테이블 디자인 - 5칸 비율로 조정 */
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); table-layout: fixed; }

        /* 각 칸의 너비 조절 (총 100%) */
        th:nth-child(1), td:nth-child(1) { width: 8%; text-align: center; }  /* ID/번호 */
        th:nth-child(2), td:nth-child(2) { width: 40%; }                     /* 제목 */
        th:nth-child(3), td:nth-child(3) { width: 15%; }                     /* 작성자 */
        th:nth-child(4), td:nth-child(4) { width: 22%; text-align: center; } /* 날짜 (여유있게) */
        th:nth-child(5), td:nth-child(5) { width: 15%; text-align: center; } /* 관리 (수정/삭제) */

        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        th { background-color: #f8f9fa; color: #555; text-transform: uppercase; font-size: 14px; }
        tr:hover { background-color: #f1f1f1; }

        .pagination-container {
            margin-top: 30px;
            display: flex;
            justify-content: center;
        }

        /* 버튼들을 하나로 묶는 바(Bar) */
        .pagination {
            display: inline-flex;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            overflow: hidden; /* 테두리 밖으로 나가는 것 방지 */
            border: 1px solid #ddd;
        }

        /* 공통 버튼 스타일 */
        .page-link {
            display: block;
            padding: 10px 16px;
            color: #333;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            border-right: 1px solid #eee;
        }

        /* 마지막 버튼은 선 없애기 */
        .page-link:last-child {
            border-right: none;
        }

        /* 마우스를 올렸을 때 효과 */
        .page-link:hover:not(.active) {
            background-color: #f8f9fa;
            color: #007bff;
        }

        /* 현재 활성화된 페이지 (파란색) */
        .active {
            background-color: #007bff;
            color: white;
            font-weight: bold;
        }

        /* 이전/다음 글자 스타일 */
        .prev-next {
            background-color: #fcfcfc;
            font-weight: 600;
        }
        .author-style {
            font-size: 14px;
            color: #888;           /* 연한 회색 */
            font-weight: normal;   /* 보통 굵기 */
        }

        /* 제목 스타일: 조금 더 명확하게 */
        table tbody td a {
            color: #007bff;
            text-decoration: none;
            font-weight: 700;      /* 제목은 확실히 강조 */
        }

        /* 마우스를 올렸을 때 전체 행의 느낌을 부드럽게 */
        tr:hover {
            background-color: #f8faff !important; /* 아주 연한 파란색 배경 */
            transition: background 0.2s;
        }

        /* 하이라이트(노란색) 스타일도 좀 더 이쁘게 */
        mark {
            background: linear-gradient(to top, #ffe58f 50%, transparent 50%); /* 밑줄 친 것 같은 느낌 */
            color: inherit;
            padding: 0 2px;
        }
        .content-preview {
            font-size: 15px;
            font-weight: 600;      /* 중간 굵기 */
            color: #555;           /* 진회색 */
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: block;
            letter-spacing: -0.5px;
        }

        /* 테이블 너비 재조정 (내용 칸 추가를 위해 비율 조정) */
        th:nth-child(1), td:nth-child(1) { width: 5%; }  /* ID */
        th:nth-child(2), td:nth-child(2) { width: 25%; } /* 제목 */
        th:nth-child(3), td:nth-child(3) { width: 30%; } /* 내용(추가) */
        th:nth-child(4), td:nth-child(4) { width: 12%; } /* 작성자 */
        th:nth-child(5), td:nth-child(5) { width: 15%; } /* 날짜 */
        th:nth-child(6), td:nth-child(6) { width: 13%; } /* 관리 */
    </style>
</head>
<body>
<h2> 게시판 </h2>
<button class="btn-write" onclick="location.href='/api/board/write'">새 글 쓰기</button>
<div style="margin-bottom: 20px;">
    <form action="/api/board/search" method="get">
        <input type="text" name="q" placeholder="검색어를 입력하세요" required>
        <button type="submit">검색</button>
        <a href="/api/board/list">[전체보기]</a>
    </form>
</div>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>제목</th>
        <th>내용</th> <th>작성자</th>
        <th>날짜</th>
        <th>관리</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="board, boardStat : ${boards}">
        <td style="color: #999;"
            th:text="${totalCount - (currentPage * 10) - boardStat.index}">번호</td>

        <td>
            <a th:href="@{/api/board/view/{id}(id=${board.id})}"
               th:utext="${board.title}">제목</a>
        </td>

        <td>
            <span class="content-preview" th:utext="${board.content}">게시글 본문 내용이 여기에 나옵니다.</span>
        </td>

        <td class="author-style" th:utext="${board.author}">작성자</td>

        <td style="font-size: 13px; color: #888;"
            th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}">날짜</td>

        <td>
            <a th:href="@{/api/board/edit/{id}(id=${board.id})}"
               style="color: #666; font-size: 13px; text-decoration: none; margin-right: 10px;">수정</a>
            <a th:href="@{/api/board/delete/{id}(id=${board.id})}"
               onclick="return confirm('정말 삭제하시겠습니까?')"
               style="color: #ff4d4f; font-size: 13px; text-decoration: none;">삭제</a>
        </td>
    </tr>
    </tbody>
</table>
<div class="pagination-container">
    <div class="pagination">
        <a th:if="${currentPage > 0}"
           th:href="@{/api/board/list(page=${currentPage - 1}, q=${q})}"
           class="page-link prev-next">&laquo; Prev</a>

        <span th:if="${totalPages > 0}" th:each="pageNum : ${#numbers.sequence(0, totalPages - 1)}">
            <span th:if="${pageNum == currentPage}"
                  th:text="${pageNum + 1}"
                  class="page-link active"></span>

            <a th:unless="${pageNum == currentPage}"
               th:href="@{/api/board/list(page=${pageNum}, q=${q})}"
               th:text="${pageNum + 1}"
               class="page-link"></a>
        </span>

        <a th:if="${currentPage < totalPages - 1}"
           th:href="@{/api/board/list(page=${currentPage + 1}, q=${q})}"
           class="page-link prev-next">Next &raquo;</a>
    </div>
</div>
<script th:inline="javascript">
    window.addEventListener('load', function() {
        // [1] 검색어 가져오기
        const urlParams = new URLSearchParams(window.location.search);
        const keyword = urlParams.get('q'); // 검색어 파라미터가 'q'가 맞는지 확인!

        // [2] 행(Row) 전체 클릭 기능 및 하이라이트 적용
        const rows = document.querySelectorAll('tbody tr');

        rows.forEach(row => {
            // A. 행 전체 클릭 설정
            row.style.cursor = 'pointer';
            row.addEventListener('click', function(e) {
                const link = row.querySelector('td a'); // 제목 링크 찾기
                // 이미 링크나 버튼을 누른 게 아니라면 상세페이지로 이동
                if (link && e.target.tagName !== 'A' && e.target.tagName !== 'BUTTON') {
                    location.href = link.getAttribute('href');
                }
            });

            // B. 하이라이트 적용 (행 내부의 텍스트 노드 탐색)
            if (keyword && keyword.trim() !== "") {
                highlightText(row, keyword);
            }
        });

        // 텍스트만 골라서 <mark> 태그를 입히는 함수
        function highlightText(node, keyword) {
            if (node.nodeType === 3) { // 텍스트 노드인 경우
                const nodeValue = node.nodeValue;
                if (nodeValue.includes(keyword)) {
                    const span = document.createElement('span');
                    const regex = new RegExp(`(${keyword})`, 'gi');
                    span.innerHTML = nodeValue.replace(regex, '<mark style="background-color: yellow; color: inherit; font-weight: inherit;">$1</mark>');
                    node.parentNode.replaceChild(span, node);
                }
            } else if (node.nodeType === 1 && node.childNodes && !/(script|style|a)/i.test(node.tagName)) {
                // 자식 노드들을 돌며 텍스트 찾기 (이미 링크인 <a> 태그 내부는 별도로 처리하거나 건너뜀)
                for (let i = 0; i < node.childNodes.length; i++) {
                    highlightText(node.childNodes[i], keyword);
                }
            } else if (node.tagName === 'A') {
                // 제목 링크(A) 내부의 텍스트도 하이라이트 처리
                for (let i = 0; i < node.childNodes.length; i++) {
                    highlightText(node.childNodes[i], keyword);
                }
            }
        }
    });
</script>
</body>
</html>
