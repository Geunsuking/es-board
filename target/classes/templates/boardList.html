<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시판</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

    <style>
        /* [기본 설정] 사내 게시판용 세련된 폰트 및 배경 */
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            padding: 50px 20px;
            background-color: #f4f7f9;
            color: #2d3436;
            letter-spacing: -0.02em; /* 한글 가독성 핵심 */
        }

        .main-container {
            max-width: 1200px;
            min-width: 1000px; /* 테이블이 깨지지 않는 최소 하한선 */
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            overflow-x: auto; /* 화면이 이보다 작아지면 가로 스크롤 생성 */
        }

        h2 {
            color: #1a1a1a;
            font-weight: 800;
            margin-bottom: 30px;
            font-size: 26px;
        }

        /* [검색창] 더 차분하고 깔끔하게 */
        .search-area {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 35px;
            border: 1px solid #ebf0f3;
        }

        /* [테이블] 비즈니스 표준 스타일 */
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* 칸 너비를 고정함 */
        }

        th, td {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap; /* 글자가 절대 아래로 떨어지지 않게 함 */
            word-break: break-all;
        }

        .col-id      { width: 60px;  text-align: center; }
        .col-title   { width: 20%; } /* 제목 비율 유지 */
        .col-content { width: 25%; } /* 내용 비율 유지 */
        .col-author  { width: 100px; } /* 작성자 칸 너비 확보 */
        .col-date    { width: 110px; text-align: center; }
        .col-views   { width: 80px;  text-align: center; }
        .col-manage  { width: 140px; text-align: center; }

        /* [제목 링크] 너무 튀지 않으면서 신뢰감 있게 */
        .title-link {
            color: #1a1a1a;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }
        .title-link:hover { color: #0984e3; text-decoration: none; }

        /* [본문 미리보기] */
        .content-preview {
            font-size: 14px;
            color: #7f8c8d;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: block;
        }

        /* [형광펜] 비즈니스 스타일 (부드러운 주황빛 강조) */
        .highlight-span {
            background-color: #fff3bf !important;
            color: #e67e22 !important; /* 가독성을 위해 살짝 어두운 주황색 */
            font-weight: 700 !important;
            padding: 1px 3px !important;
            border-radius: 3px !important;
            box-shadow: inset 0 -4px 0 rgba(255, 235, 59, 0.2) !important;
            display: inline !important;
            line-height: 1.2 !important;
        }

        /* em 태그는 깔끔하게 중립화 */
        em {
            background-color: transparent !important;
            font-style: normal !important;
            display: inline !important;
            padding: 0 !important;
            margin: 0 !important;
            color: inherit !important;
        }

        /* 버튼 스타일 보정 */
        .btn-primary { background-color: #2d3436; border: none; }
        .btn-primary:hover { background-color: #000; }
        .btn-sm {
            border-radius: 4px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-outline-secondary:hover { background-color: #6c757d; color: white; }
        .btn-outline-danger:hover { background-color: #dc3545; color: white; }
    </style>
</head>
<body>

<div class="main-container">
    <h2>게시판</h2>

    <div class="d-flex justify-content-between mb-4">
        <button class="btn btn-primary px-4 fw-bold" onclick="location.href='/api/board/write'">새 글 쓰기</button>
        <a href="/api/board/list" class="btn btn-outline-dark btn-sm d-flex align-items-center">전체보기</a>
    </div>

    <div class="search-area">
        <form th:action="@{/api/board/list}" method="get" class="row g-2 justify-content-center">
            <div class="col-auto">
                <select name="searchType" class="form-select border-0 shadow-sm" style="background-color: white;">
                    <option value="all" th:selected="${searchType == 'all'}">전체검색</option>
                    <option value="title" th:selected="${searchType == 'title'}">제목</option>
                    <option value="content" th:selected="${searchType == 'content'}">내용</option>
                    <option value="title_content" th:selected="${searchType == 'title_content'}">제목+내용</option>
                </select>
            </div>
            <div class="col-md-5">
                <input type="text" name="keyword" class="form-control border-0 shadow-sm" th:value="${keyword}" placeholder="검색어를 입력해 주세요.">
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-dark px-4 shadow-sm">검색</button>
            </div>
        </form>
    </div>

    <table class="table table-hover">
        <thead>
        <tr>
            <th class="col-id">번호</th>
            <th class="col-title">제목</th>
            <th class="col-content">내용</th>
            <th class="col-author">작성자</th>
            <th class="col-date">등록일</th>
            <th class="col-views">조회수</th> <th style="width: 150px; text-align: center;">관리</th> </tr>
        </tr>
        </thead>
        <tbody>
        <tr th:each="board, boardStat : ${boards}" class="board-row" th:data-id="${board.id}" style="cursor: pointer;">
            <td class="col-id" th:text="${totalCount - (currentPage * 10) - boardStat.index}">1</td>
            <td class="col-title">
                <a th:href="@{/api/board/view/{id}(id=${board.id})}" class="title-link" th:utext="${board.title}">제목</a>
            </td>
            <td class="col-content">
                <span class="content-preview" th:utext="${board.content}">내용</span>
            </td>
            <td class="col-author" th:utext="${board.author}">작성자</td>
            <td class="col-date" th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd')}">날짜</td>
            <td class="col-views" th:text="${board.views}">0</td> <td style="text-align: center;" onclick="event.stopPropagation();">
            <a th:href="@{/api/board/edit/{id}(id=${board.id})}" class="btn btn-sm btn-outline-secondary py-0" style="font-size: 12px;">수정</a>
            <button type="button" class="btn btn-sm btn-outline-danger py-0" style="font-size: 12px;"
                    th:onclick="deleteBoard([[${board.id}]])">삭제</button>
        </td>
        </tr>
        </tbody>
    </table>
</div>

<script th:inline="javascript">
    // 1. 삭제 함수 (새로 추가)
    function deleteBoard(id) {
        console.log("삭제 요청 ID:", id);
        if (!id) return;

        if (confirm("정말로 이 게시글을 삭제하시겠습니까?")) {
            fetch('/api/board/delete/' + id, {
                method: 'DELETE'
            }).then(response => {
                if (response.ok) {
                    alert("삭제되었습니다.");
                    location.reload(); // 성공 시 목록 새로고침
                } else {
                    alert("삭제 실패했습니다. (코드: " + response.status + ")");
                }
            }).catch(err => {
                console.error("에러 발생:", err);
                alert("삭제 처리 중 오류가 발생했습니다.");
            });
        }
    }

    // 2. 기존 로직들 (유지)
    document.addEventListener('DOMContentLoaded', function() {
        // 하이라이트 변환 로직
        function convertEmToSpan() {
            const keywordInput = document.querySelector('input[name="keyword"]');
            const keyword = keywordInput ? keywordInput.value.trim() : "";
            const emTags = document.querySelectorAll('em');

            emTags.forEach(em => {
                em.removeAttribute('style');
                if (keyword && em.textContent.includes(keyword)) {
                    const originalText = em.textContent;
                    const regex = new RegExp(`(${keyword})`, 'g');
                    const newHTML = originalText.replace(regex, `<span class="highlight-span">$1</span>`);
                    em.outerHTML = newHTML;
                } else {
                    em.className = 'highlight-span';
                }
            });
        }

        convertEmToSpan();
        setTimeout(convertEmToSpan, 50);

        // 행 클릭 시 상세보기 이동 로직
        document.querySelectorAll('.board-row').forEach(row => {
            row.addEventListener('click', function(e) {
                // 클릭한 요소가 버튼(수정/삭제)이나 링크가 아닐 때만 이동
                if (e.target.tagName !== 'A' && !e.target.closest('a') && e.target.tagName !== 'BUTTON') {
                    const id = this.getAttribute('data-id');
                    location.href = '/api/board/view/' + id;
                }
            });
        });
    });
</script>
</body>
</html>
