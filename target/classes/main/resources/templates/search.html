<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>사내 게시판 검색</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; background-color: #f5f7f9; }
        /* 상단 파란 바 */
        .header { background-color: #1e88e5; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        /* 컨텐츠 영역 */
        .container { display: flex; min-height: 100vh; }
        .sidebar { width: 200px; background-color: #fff; border-right: 1px solid #ddd; padding: 20px; }
        .main-content { flex: 1; padding: 30px; }
        /* 게시판 테이블 스타일 */
        .board-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .board-table th { background-color: #f8f9fa; border-bottom: 2px solid #dee2e6; padding: 12px; text-align: left; font-size: 14px; color: #666; }
        .board-table td { padding: 15px 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .title { color: #333; font-weight: bold; cursor: pointer; }
        /* 검색창 영역 */
        .search-area { display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .search-input { padding: 8px; width: 250px; border: 1px solid #ddd; border-radius: 4px 0 0 4px; }
        .search-btn { background: #1e88e5; color: white; border: none; padding: 8px 15px; border-radius: 0 4px 4px 0; cursor: pointer; }
    </style>
</head>
<body>
<div class="header">
    <div style="font-size: 20px; font-weight: bold;">🏢 사내 게시판 시스템</div>
</div>
<div class="container">
    <div class="sidebar">
        <p style="color: #1e88e5; font-weight: bold;">● 최근공지글</p>
        <p>● 사내게시판</p>
        <p>● 설문조사</p>
    </div>
    <div class="main-content">
        <div style="background: white; padding: 15px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
            <form action="/save" method="post" style="display: flex; gap: 10px; align-items: center;">
                <span style="font-weight: bold;">📝 새 과일 등록:</span>
                <input type="text" name="name" placeholder="이름을 입력하세요" style="flex: 1; padding: 8px; border: 1px solid #ddd;" required>
                <button type="submit" style="background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer;">등록하기</button>
            </form>
        </div>
        <div class="search-area">
            <form action="/search" method="get">
                <input type="text" name="query" class="search-input" placeholder="검색어를 입력하세요" th:value="${query}">
                <button type="submit" class="search-btn">🔍</button>
            </form>
        </div>

        <table class="board-table">
            <thead>
            <tr>
                <th style="width: 60%;">제목</th>
                <th>게시판</th>
                <th>작성자</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${results}">
                <td class="title" th:text="${item.name}">글 제목이 들어갑니다.</td>
                <td style="color: #888;">사내알림</td>
                <td style="color: #888;">시스템관리자</td>
            </tr>
            </tbody>
        </table>
        <div th:if="${results == null || results.size() == 0}" style="text-align: center; margin-top: 50px; color: #999;">
            검색된 결과가 없습니다.
        </div>
    </div>
</div>
</body>
</html>
